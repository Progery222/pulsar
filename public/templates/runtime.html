<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000; }
  #stage { position:fixed; inset:0; overflow:hidden; }
</style>
</head>
<body>
  <div id="stage"></div>
<script>
// ── Data-driven runtime шаблонов. Рендер-модуль (electron) вызывает:
//   initTemplate({ id, dur, fontsDir, data })  — собрать шаблон
//   seek(t)                                     — позиционировать все анимации на время t
// Затем покадрово capturePage. Всё в относительных единицах (vw/vh) → любой формат.

const clamp01 = (x) => (x < 0 ? 0 : x > 1 ? 1 : x);
const seg = (t, a, b) => clamp01((t - a) / (b - a));
const eoc = (x) => 1 - Math.pow(1 - x, 3);            // easeOutCubic
const eio = (x) => (x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3)/2);
const eob = (x) => { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3*Math.pow(x-1,3) + c1*Math.pow(x-1,2); };

const TEMPLATES = {};
const reg = (id, fn) => { TEMPLATES[id] = fn; };
const el = (tag, css, html) => { const e = document.createElement(tag); if (css) e.style.cssText = css; if (html != null) e.innerHTML = html; return e; };

// Инжект шрифтов из переданной папки (dev: assets/fonts, prod: resources/fonts).
function injectFonts(dir) {
  const url = (f) => `url('file:///${dir.replace(/\\/g,'/').replace(/ /g,'%20')}/${f}')`;
  const s = el('style');
  s.textContent =
    `@font-face{font-family:'Oswald';src:${url('Oswald.ttf')};font-weight:700;}` +
    `@font-face{font-family:'Montserrat';src:${url('Montserrat.ttf')};}` +
    `@font-face{font-family:'RussoOne';src:${url('RussoOne.ttf')};}` +
    `@font-face{font-family:'Rubik';src:${url('Rubik.ttf')};}`;
  document.head.appendChild(s);
}

// ────────────────────────────────────────────────────────────────
// Шаблон STORY — кино/эстетика (matte-фон, свечение, cutout, shine-текст).
reg('story', (stage, d) => {
  const accent = d.accent || '#a9d2ff';
  const bg1 = d.bg1 || '#1b3a5e', bg2 = d.bg2 || '#0f1e34', bg3 = d.bg3 || '#05080f';
  // База-градиент
  stage.appendChild(el('div', `position:absolute;inset:-12%;will-change:transform;background:linear-gradient(160deg, ${bg1} 0%, ${bg2} 46%, ${bg3} 100%);`)).id = 'bg';
  // Mesh/aurora — цветные пятна, дрейф + screen-blend
  [['m1','28%','24%','62vw','rgba(90,150,255,0.55)'],['m2','78%','30%','52vw','rgba(120,220,255,0.40)'],['m3','40%','82%','70vw','rgba(70,110,200,0.42)']].forEach(([id,l,tp,sz,c]) => {
    const e = el('div', `position:absolute;left:${l};top:${tp};width:${sz};height:${sz};transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,${c},transparent 62%);filter:blur(3vw);mix-blend-mode:screen;will-change:transform,opacity;`);
    e.id = id; stage.appendChild(e);
  });
  // Свечение + floor-glow под объектом
  stage.appendChild(el('div', `position:absolute;left:50%;top:56%;width:74vw;height:74vw;transform:translate(-50%,-50%);background:radial-gradient(circle, rgba(160,210,255,0.30), transparent 60%);filter:blur(2vw);will-change:transform,opacity;`)).id = 'blob';
  stage.appendChild(el('div', `position:absolute;left:50%;top:70%;width:46vw;height:9vw;transform:translate(-50%,-50%);background:radial-gradient(ellipse, rgba(150,200,255,0.35), transparent 70%);filter:blur(1.2vw);will-change:opacity;`)).id = 'floor';
  [['d1','18%','30%','1.6vw'],['d2','80%','40%','1.1vw'],['d3','72%','66%','2vw']].forEach(([id,l,tp,sz]) => {
    const e = el('div', `position:absolute;left:${l};top:${tp};width:${sz};height:${sz};border-radius:50%;background:rgba(210,230,255,0.6);filter:blur(0.2vw);will-change:transform,opacity;`);
    e.id = id; stage.appendChild(e);
  });
  const subj = el('img', `position:absolute;left:50%;top:52%;width:40vw;transform:translate(-50%,-50%);filter:drop-shadow(0 3vh 4vh rgba(0,0,0,0.55));will-change:transform,opacity;`);
  subj.id = 'subject'; subj.src = d.subjectImage || ''; stage.appendChild(subj);
  // Eyebrow
  const eye = el('div', `position:absolute;left:0;width:100%;top:8.5%;text-align:center;font-family:'Montserrat',sans-serif;font-weight:600;font-size:2.5vw;letter-spacing:1.2vw;color:${accent};text-transform:uppercase;will-change:transform,opacity;`, d.eyebrow || '');
  eye.id = 'eyebrow'; stage.appendChild(eye);
  const title = el('div', `position:absolute;left:0;width:100%;top:12%;text-align:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:11vw;letter-spacing:0.4vw;color:#fff;text-transform:uppercase;will-change:transform,filter,clip-path;`, d.title || '');
  title.id = 'title';
  const shine = el('div', `position:absolute;inset:0;background:linear-gradient(100deg,transparent 40%,rgba(255,255,255,0.85) 50%,transparent 60%);-webkit-background-clip:text;background-clip:text;color:transparent;background-size:220% 100%;pointer-events:none;`, d.title || '');
  shine.className = 'shine'; title.appendChild(shine); stage.appendChild(title);
  stage.appendChild(el('div', `position:absolute;left:50%;top:calc(12% + 14vw);width:17vw;height:0.4vh;margin-left:-8.5vw;background:linear-gradient(90deg,transparent,${accent},transparent);transform-origin:center;will-change:transform;`)).id = 'line';
  const sub = el('div', `position:absolute;left:0;width:100%;top:calc(12% + 16vw);text-align:center;font-family:'Montserrat',sans-serif;font-size:3.5vw;letter-spacing:0.6vw;color:#d3e2ff;text-transform:lowercase;will-change:transform,opacity;`, d.subtitle || '');
  sub.id = 'sub'; stage.appendChild(sub);
  if (d.cta) {
    const cta = el('div', `position:absolute;left:0;width:100%;top:80%;text-align:center;font-family:'Montserrat',sans-serif;font-weight:600;font-size:3.1vw;letter-spacing:0.3vw;color:#0a1420;text-transform:uppercase;will-change:transform,opacity;`,
      `<span style="display:inline-block;background:#fff;padding:1.9vh 4.6vw;border-radius:100px;box-shadow:0 1.4vh 3vh rgba(0,0,0,0.35);">${d.cta}</span>`);
    cta.id = 'cta'; stage.appendChild(cta);
  }
  // Световой свип через кадр (проезжает один раз)
  const sweep = el('div', `position:absolute;top:-20%;left:0;width:40%;height:140%;transform:skewX(-18deg) translateX(-160%);background:linear-gradient(90deg,transparent,rgba(255,255,255,0.16),transparent);mix-blend-mode:screen;pointer-events:none;will-change:transform,opacity;`);
  sweep.id = 'sweep'; stage.appendChild(sweep);
  stage.appendChild(el('div', `position:absolute;inset:0;pointer-events:none;background:radial-gradient(120% 80% at 50% 45%,transparent 55%,rgba(0,0,0,0.40) 100%);`));
  const grain = el('div', `position:absolute;inset:0;opacity:0.07;mix-blend-mode:overlay;pointer-events:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='160' height='160' filter='url(%23n)'/></svg>");`);
  grain.id = 'grain'; stage.appendChild(grain);

  const g = (id) => document.getElementById(id);
  return (t) => {
    g('bg').style.transform = `scale(1.1) translate(${Math.sin(t*0.3)*1.2}vw,${Math.cos(t*0.25)*1.2}vh)`;
    // mesh дрейф
    [['m1',1.6,1.1,0.35],['m2',-1.3,0.9,0.5],['m3',1.0,-1.2,0.28]].forEach(([id,ax,ay,sp]) => {
      g(id).style.transform = `translate(calc(-50% + ${Math.sin(t*sp+ax)*3}vw), calc(-50% + ${Math.cos(t*sp+ay)*3}vh)) scale(${1+0.06*Math.sin(t*sp)})`;
    });
    g('blob').style.transform = `translate(-50%,-50%) scale(${1+0.05*Math.sin(t*0.9)})`;
    g('blob').style.opacity = String(0.75+0.2*Math.sin(t*1.2));
    [['d1',1.4,0.7],['d2',-1.0,1.1],['d3',0.8,-0.6]].forEach(([id,ax,ay]) => {
      const e = g(id); e.style.transform = `translate(${Math.sin(t*0.6+ax)*ax}vw,${Math.cos(t*0.5+ay)*ay}vh)`;
      e.style.opacity = String(clamp01(seg(t,0.6,1.4))*(0.5+0.3*Math.sin(t+ax)));
    });
    const ey = eoc(seg(t,0.0,0.6));
    g('eyebrow').style.opacity = String(ey); g('eyebrow').style.transform = `translateY(${(1-ey)*1.5}vh)`;
    const title = g('title');
    title.style.clipPath = `inset(${(1-eio(seg(t,0.15,0.95)))*100}% 0 0 0)`;
    title.style.filter = `blur(${(1-eoc(seg(t,0.15,0.8)))*1.2}vw)`;
    title.style.transform = `translateY(${(1-eoc(seg(t,0.15,0.95)))*3.5}vh)`;
    title.querySelector('.shine').style.backgroundPosition = `${120-seg(t,0.8,1.7)*240}% 0`;
    g('line').style.transform = `scaleX(${eoc(seg(t,0.45,1.15))})`;
    const st = eoc(seg(t,0.6,1.35));
    g('sub').style.opacity = String(st); g('sub').style.transform = `translateY(${(1-st)*2}vh)`;
    const sp = eob(seg(t,0.4,1.25));
    const subj = g('subject');
    subj.style.opacity = String(clamp01(seg(t,0.4,0.95)));
    subj.style.transform = `translate(-50%,-50%) translateY(${(1-sp)*9+Math.sin(t*1.4)*1.1}vh) rotate(${(1-clamp01(sp))*-4}deg) scale(${0.82+0.18*clamp01(sp)})`;
    g('floor').style.opacity = String(clamp01(seg(t,0.5,1.1))*(0.7+0.25*Math.sin(t*1.4)));
    // свип
    const sw = seg(t,1.1,2.0);
    g('sweep').style.transform = `skewX(-18deg) translateX(${-160+sw*420}%)`;
    g('sweep').style.opacity = String(sw>0&&sw<1?1:0);
    const cta = g('cta');
    if (cta) { const ct = eob(seg(t,1.6,2.25)); cta.style.opacity = String(clamp01(seg(t,1.6,2.1)));
      cta.style.transform = `scale(${(0.86+0.14*clamp01(ct))*(t>2.2?1+0.02*Math.sin((t-2.2)*4):1)})`; }
    g('grain').style.transform = `translate(${(Math.sin(t*30)*10).toFixed(0)}px,${(Math.cos(t*27)*10).toFixed(0)}px)`;
  };
});

// ────────────────────────────────────────────────────────────────
// Шаблон NEON — хайп/color-block (неон, глоу, кинетик-текст).
reg('neon', (stage, d) => {
  const accent = d.accent || '#00e5ff';
  stage.appendChild(el('div', `position:absolute;inset:-12%;background:linear-gradient(150deg,#12021f 0%,#1a0530 50%,#05010c 100%);`)).id = 'bg';
  stage.appendChild(el('div', `position:absolute;left:22%;top:24%;width:70vw;height:70vw;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(255,45,149,0.55),transparent 60%);filter:blur(3vw);mix-blend-mode:screen;will-change:transform;`)).id = 'n1';
  stage.appendChild(el('div', `position:absolute;left:80%;top:70%;width:64vw;height:64vw;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,0.5),transparent 60%);filter:blur(3vw);mix-blend-mode:screen;will-change:transform;`)).id = 'n2';
  stage.appendChild(el('div', `position:absolute;left:-10%;top:60%;width:120%;height:13vh;background:linear-gradient(90deg,${accent},transparent);transform:rotate(-8deg);opacity:0.22;filter:blur(0.5vw);will-change:opacity;`)).id = 'bar';
  const subj = el('img', `position:absolute;left:50%;top:54%;width:44vw;transform:translate(-50%,-50%);filter:drop-shadow(0 0 3vw ${accent}) drop-shadow(0 3vh 3vh rgba(0,0,0,0.6));will-change:transform,opacity;`);
  subj.id = 'subject'; subj.src = d.subjectImage || ''; stage.appendChild(subj);
  const title = el('div', `position:absolute;left:0;width:100%;top:8%;text-align:center;font-family:'RussoOne',sans-serif;font-size:13vw;color:#fff;text-transform:uppercase;letter-spacing:0.2vw;text-shadow:0 0 2vw ${accent},0 0 0.6vw #fff;will-change:transform,opacity;`, d.title || '');
  title.id = 'title'; stage.appendChild(title);
  const sub = el('div', `position:absolute;left:0;width:100%;top:calc(8% + 15vw);text-align:center;font-family:'Montserrat',sans-serif;font-weight:700;font-size:3.8vw;letter-spacing:0.4vw;text-transform:uppercase;will-change:transform,opacity;`,
    `<span style="background:${accent};color:#0a0a0a;padding:0.6vh 2vw;border-radius:6px;">${d.subtitle || ''}</span>`);
  sub.id = 'sub'; stage.appendChild(sub);
  if (d.cta) {
    const cta = el('div', `position:absolute;left:0;width:100%;top:82%;text-align:center;font-family:'Montserrat',sans-serif;font-weight:700;font-size:3.2vw;color:#fff;text-transform:uppercase;will-change:transform,opacity;`,
      `<span style="display:inline-block;border:2px solid ${accent};padding:1.4vh 4vw;border-radius:100px;box-shadow:0 0 2vw ${accent};">${d.cta}</span>`);
    cta.id = 'cta'; stage.appendChild(cta);
  }
  const grain = el('div', `position:absolute;inset:0;opacity:0.08;mix-blend-mode:overlay;pointer-events:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='160' height='160' filter='url(%23n)'/></svg>");`);
  grain.id = 'grain'; stage.appendChild(grain);
  const g = (id) => document.getElementById(id);
  return (t) => {
    g('n1').style.transform = `translate(calc(-50% + ${Math.sin(t*0.7)*3}vw),calc(-50% + ${Math.cos(t*0.6)*3}vh))`;
    g('n2').style.transform = `translate(calc(-50% + ${Math.cos(t*0.6)*3}vw),calc(-50% + ${Math.sin(t*0.5)*3}vh))`;
    g('bar').style.opacity = String(0.16+0.12*Math.sin(t*3));
    const title = g('title');
    title.style.opacity = String(clamp01(seg(t,0.1,0.5)));
    title.style.transform = `translateY(${(1-eoc(seg(t,0.1,0.8)))*-4}vh) scale(${0.8+0.2*clamp01(eob(seg(t,0.1,0.8)))})`;
    g('sub').style.opacity = String(clamp01(seg(t,0.4,0.8)));
    g('sub').style.transform = `scale(${0.7+0.3*clamp01(eob(seg(t,0.4,1.1)))})`;
    const sp = eob(seg(t,0.3,1.0)); const subj = g('subject');
    subj.style.opacity = String(clamp01(seg(t,0.3,0.8)));
    const jit = t < 1.2 ? Math.sin(t*57)*1.0 : 0;
    subj.style.transform = `translate(-50%,-50%) translateX(${jit}vw) scale(${0.8+0.2*clamp01(sp)})`;
    const cta = g('cta'); if (cta) { cta.style.opacity = String(clamp01(seg(t,1.4,1.9))); cta.style.transform = `scale(${0.85+0.15*clamp01(eob(seg(t,1.4,2.0)))})`; }
    g('grain').style.transform = `translate(${(Math.sin(t*40)*12).toFixed(0)}px,${(Math.cos(t*33)*12).toFixed(0)}px)`;
  };
});

// Шаблон MINIMAL — чисто/эстетика (светлый фон, элегантная типографика).
reg('minimal', (stage, d) => {
  const accent = d.accent || '#c8a26a';
  stage.appendChild(el('div', `position:absolute;inset:0;background:linear-gradient(180deg,#f6f3ee 0%,#e9e2d6 100%);`)).id = 'bg';
  stage.appendChild(el('div', `position:absolute;left:50%;top:60%;width:52vw;height:10vw;transform:translate(-50%,-50%);background:radial-gradient(ellipse,rgba(0,0,0,0.14),transparent 70%);filter:blur(1.4vw);will-change:opacity;`)).id = 'floor';
  const subj = el('img', `position:absolute;left:50%;top:54%;width:42vw;transform:translate(-50%,-50%);filter:drop-shadow(0 3vh 3vh rgba(0,0,0,0.28));will-change:transform,opacity;`);
  subj.id = 'subject'; subj.src = d.subjectImage || ''; stage.appendChild(subj);
  const eye = el('div', `position:absolute;left:0;width:100%;top:9%;text-align:center;font-family:'Montserrat',sans-serif;font-weight:600;font-size:2.3vw;letter-spacing:1.4vw;color:${accent};text-transform:uppercase;will-change:transform,opacity;`, d.eyebrow || '');
  eye.id = 'eyebrow'; stage.appendChild(eye);
  const title = el('div', `position:absolute;left:0;width:100%;top:12.5%;text-align:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:10vw;letter-spacing:0.3vw;color:#1a1a1a;text-transform:uppercase;will-change:transform,opacity,clip-path;`, d.title || '');
  title.id = 'title'; stage.appendChild(title);
  stage.appendChild(el('div', `position:absolute;left:50%;top:calc(12.5% + 12vw);width:12vw;height:0.35vh;margin-left:-6vw;background:${accent};transform-origin:center;will-change:transform;`)).id = 'line';
  const sub = el('div', `position:absolute;left:0;width:100%;top:calc(12.5% + 14vw);text-align:center;font-family:'Montserrat',sans-serif;font-size:3.2vw;letter-spacing:0.5vw;color:#555;text-transform:lowercase;will-change:transform,opacity;`, d.subtitle || '');
  sub.id = 'sub'; stage.appendChild(sub);
  if (d.cta) {
    const cta = el('div', `position:absolute;left:0;width:100%;top:82%;text-align:center;font-family:'Montserrat',sans-serif;font-weight:600;font-size:3vw;color:#fff;text-transform:uppercase;will-change:transform,opacity;`,
      `<span style="display:inline-block;background:#1a1a1a;padding:1.6vh 4.5vw;border-radius:100px;">${d.cta}</span>`);
    cta.id = 'cta'; stage.appendChild(cta);
  }
  const g = (id) => document.getElementById(id);
  return (t) => {
    const ey = eoc(seg(t,0.0,0.6)); g('eyebrow').style.opacity = String(ey); g('eyebrow').style.transform = `translateY(${(1-ey)*1.2}vh)`;
    const title = g('title');
    title.style.clipPath = `inset(0 0 ${(1-eio(seg(t,0.15,0.95)))*100}% 0)`;
    title.style.transform = `translateY(${(1-eoc(seg(t,0.15,0.95)))*2}vh)`;
    title.style.opacity = String(clamp01(seg(t,0.15,0.5)));
    g('line').style.transform = `scaleX(${eoc(seg(t,0.4,1.0))})`;
    const st = eoc(seg(t,0.55,1.25)); g('sub').style.opacity = String(st); g('sub').style.transform = `translateY(${(1-st)*1.5}vh)`;
    const sp = eob(seg(t,0.35,1.15)); const subj = g('subject');
    subj.style.opacity = String(clamp01(seg(t,0.35,0.9)));
    subj.style.transform = `translate(-50%,-50%) translateY(${(1-sp)*6+Math.sin(t*1.3)*0.8}vh) scale(${0.88+0.12*clamp01(sp)})`;
    g('floor').style.opacity = String(clamp01(seg(t,0.5,1.1)));
    const cta = g('cta'); if (cta) { cta.style.opacity = String(clamp01(seg(t,1.5,2.0))); cta.style.transform = `scale(${0.9+0.1*clamp01(eob(seg(t,1.5,2.1)))})`; }
  };
});

// ────────────────────────────────────────────────────────────────
// Шаблон KINETIC — драйв/бит-слэм: цвет-блоки, текст-плашки со слэмом,
// панч-зум объекта + микро-шейк, нижняя маркиза, вспышки на битах.
reg('kinetic', (stage, d) => {
  const accent = d.accent || '#ccff00';
  const alt = d.alt || '#ff2d6b';
  const beats = [0.0,0.42,0.84,1.26,1.68,2.16,2.64,3.12,3.66,4.2,4.74,5.28,5.82];
  const nb = (t) => { let b = 0; for (const x of beats) { if (x <= t) b = x; else break; } return b; };
  const punch = (t, w = 0.13) => { const dt = t - nb(t); return Math.max(0, 1 - dt / w); };
  const slamX = (t, a, fromPct) => (1 - clamp01(eob(seg(t, a, a + 0.34)))) * fromPct;

  stage.appendChild(el('div', `position:absolute;inset:0;background:#0a0a0c;`));
  const blk1 = el('div', `position:absolute;left:-20%;top:-12%;width:95%;height:72%;background:${accent};transform:rotate(-8deg);opacity:0.12;will-change:transform,opacity;`); blk1.id = 'blk1'; stage.appendChild(blk1);
  const blk2 = el('div', `position:absolute;right:-20%;bottom:-12%;width:95%;height:64%;background:${alt};transform:rotate(-8deg);opacity:0.10;will-change:transform,opacity;`); blk2.id = 'blk2'; stage.appendChild(blk2);

  const wrap = el('div', `position:absolute;inset:0;transform-origin:50% 50%;will-change:transform;`); wrap.id = 'wrap'; stage.appendChild(wrap);

  const subj = el('img', `position:absolute;left:50%;top:56%;width:46vw;transform:translate(-50%,-50%);filter:drop-shadow(0 3vh 4vh rgba(0,0,0,0.6));will-change:transform,opacity;`);
  subj.id = 'subject'; subj.src = d.subjectImage || ''; wrap.appendChild(subj);

  if (d.eyebrow) {
    const eye = el('div', `position:absolute;left:50%;top:8.5%;transform:translateX(-50%);font-family:'Montserrat',sans-serif;font-weight:700;font-size:2.6vw;letter-spacing:0.6vw;text-transform:uppercase;color:#0a0a0a;background:${accent};padding:1vh 2.4vw;will-change:transform,opacity;`, d.eyebrow);
    eye.id = 'eyebrow'; wrap.appendChild(eye);
  }
  const title = el('div', `position:absolute;left:6%;top:15%;font-family:'RussoOne',sans-serif;font-size:12vw;line-height:0.96;text-transform:uppercase;color:#0a0a0a;background:${accent};padding:0.6vh 2.6vw;transform:skewX(-6deg);will-change:transform,opacity;`, d.title || '');
  title.id = 'title'; wrap.appendChild(title);
  const sub = el('div', `position:absolute;right:6%;top:30%;font-family:'Oswald',sans-serif;font-weight:700;font-size:5.2vw;letter-spacing:0.3vw;text-transform:uppercase;color:#fff;background:${alt};padding:0.5vh 2vw;transform:skewX(-6deg);will-change:transform,opacity;`, d.subtitle || '');
  sub.id = 'sub'; wrap.appendChild(sub);

  if (d.cta) {
    const cta = el('div', `position:absolute;left:50%;top:80%;transform:translateX(-50%);font-family:'Montserrat',sans-serif;font-weight:800;font-size:3.4vw;letter-spacing:0.3vw;text-transform:uppercase;color:#0a0a0a;will-change:transform,opacity;`,
      `<span style="display:inline-block;background:#fff;padding:1.7vh 4.6vw;border-radius:100px;box-shadow:0 1.2vh 3vh rgba(0,0,0,0.4);">${d.cta}</span>`);
    cta.id = 'cta'; wrap.appendChild(cta);
  }

  const mqText = (((d.title || '') + ' • ' + (d.subtitle || '') + ' • ')).repeat(6);
  const mq = el('div', `position:absolute;left:0;top:90.5%;width:100%;height:7%;overflow:hidden;background:${accent};display:flex;align-items:center;will-change:opacity;`); mq.id = 'mq';
  const mqInner = el('div', `white-space:nowrap;font-family:'Oswald',sans-serif;font-weight:700;font-size:3vw;letter-spacing:0.3vw;text-transform:uppercase;color:#0a0a0a;will-change:transform;`, mqText);
  mqInner.id = 'mqInner'; mq.appendChild(mqInner); wrap.appendChild(mq);

  const flash = el('div', `position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;will-change:opacity;`); flash.id = 'flash'; stage.appendChild(flash);
  stage.appendChild(el('div', `position:absolute;inset:0;pointer-events:none;background:radial-gradient(120% 80% at 50% 45%,transparent 55%,rgba(0,0,0,0.45) 100%);`));

  const g = (id) => document.getElementById(id);
  return (t) => {
    wrap.style.transform = `scale(${1 + 0.02 * punch(t)})`;
    g('blk1').style.opacity = String(0.10 + 0.12 * punch(t));
    g('blk1').style.transform = `rotate(-8deg) translateX(${punch(t) * 1.5}vw)`;
    g('blk2').style.opacity = String(0.08 + 0.12 * punch(t, 0.16));
    const sp = eob(seg(t, 0.1, 0.7)); const subj = g('subject');
    subj.style.opacity = String(clamp01(seg(t, 0.1, 0.5)));
    const shx = Math.sin(t * 40) * 0.25 * punch(t), shy = Math.cos(t * 37) * 0.25 * punch(t);
    subj.style.transform = `translate(-50%,-50%) translate(${shx}vw,${shy}vh) scale(${(0.8 + 0.2 * clamp01(sp)) * (1 + 0.03 * punch(t))})`;
    const eye = g('eyebrow'); if (eye) { const e = eob(seg(t, 0.0, 0.4)); eye.style.opacity = String(clamp01(seg(t, 0.0, 0.3))); eye.style.transform = `translateX(-50%) scale(${0.6 + 0.4 * clamp01(e)})`; }
    const ti = g('title'); ti.style.opacity = String(t >= 0.25 ? 1 : 0); ti.style.transform = `skewX(-6deg) translateX(${slamX(t, 0.25, -140)}%)`;
    const su = g('sub'); su.style.opacity = String(t >= 0.6 ? 1 : 0); su.style.transform = `skewX(-6deg) translateX(${slamX(t, 0.6, 140)}%)`;
    const cta = g('cta'); if (cta) { const c = eob(seg(t, 1.6, 2.15)); cta.style.opacity = String(clamp01(seg(t, 1.6, 2.0))); cta.style.transform = `translateX(-50%) scale(${(0.85 + 0.15 * clamp01(c)) * (1 + 0.03 * punch(t))})`; }
    g('mqInner').style.transform = `translateX(${-(t * 14) % 50}%)`;
    g('mq').style.opacity = String(clamp01(seg(t, 0.8, 1.2)));
    const fb = [0.42, 1.68, 3.12, 4.2, 5.28]; let fl = 0; for (const b of fb) { const dt = t - b; if (dt >= 0 && dt < 0.1) fl = Math.max(fl, (1 - dt / 0.1) * 0.5); } g('flash').style.opacity = String(fl);
  };
});

// ────────────────────────────────────────────────────────────────
// Шаблон GLITCH — глитч/хайп: RGB-сплит, скан-строки, дёрганые плашки, глитч-бар.
reg('glitch', (stage, d) => {
  const accent = d.accent || '#00e5ff';
  const hash = (x) => { const s = Math.sin(x * 127.1) * 43758.5453; return s - Math.floor(s); };
  stage.appendChild(el('div', `position:absolute;inset:0;background:#07070a;`));
  stage.appendChild(el('div', `position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,0.05) 0 1px,transparent 1px 3px);mix-blend-mode:overlay;`));
  const wrap = el('div', `position:absolute;inset:0;will-change:transform;`); wrap.id = 'wrap'; stage.appendChild(wrap);
  const subj = el('img', `position:absolute;left:50%;top:55%;width:46vw;transform:translate(-50%,-50%);filter:drop-shadow(0.6vw 0 0 rgba(255,0,80,0.55)) drop-shadow(-0.6vw 0 0 rgba(0,229,255,0.55)) drop-shadow(0 3vh 4vh rgba(0,0,0,0.6));will-change:transform,opacity;`);
  subj.id = 'subject'; subj.src = d.subjectImage || ''; wrap.appendChild(subj);
  if (d.eyebrow) { const eye = el('div', `position:absolute;left:0;width:100%;top:8%;text-align:center;font-family:'Montserrat',sans-serif;font-weight:700;font-size:2.4vw;letter-spacing:1vw;text-transform:uppercase;color:${accent};will-change:opacity;`, d.eyebrow); eye.id = 'eyebrow'; wrap.appendChild(eye); }
  const title = el('div', `position:absolute;left:0;width:100%;top:12%;text-align:center;font-family:'RussoOne',sans-serif;font-size:13vw;text-transform:uppercase;color:#fff;letter-spacing:0.2vw;will-change:transform,opacity,text-shadow,clip-path;`, d.title || '');
  title.id = 'title'; wrap.appendChild(title);
  const sub = el('div', `position:absolute;left:0;width:100%;top:calc(12% + 15vw);text-align:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:4vw;letter-spacing:0.4vw;text-transform:uppercase;will-change:opacity,transform;`,
    `<span style="background:${accent};color:#07070a;padding:0.5vh 2vw;">${d.subtitle || ''}</span>`);
  sub.id = 'sub'; wrap.appendChild(sub);
  if (d.cta) { const cta = el('div', `position:absolute;left:0;width:100%;top:82%;text-align:center;font-family:'Montserrat',sans-serif;font-weight:800;font-size:3.2vw;text-transform:uppercase;color:#07070a;will-change:opacity,transform;`, `<span style="display:inline-block;background:${accent};padding:1.5vh 4.4vw;border-radius:6px;">${d.cta}</span>`); cta.id = 'cta'; wrap.appendChild(cta); }
  const bar = el('div', `position:absolute;left:0;width:100%;height:6vh;background:${accent};opacity:0;mix-blend-mode:screen;pointer-events:none;will-change:transform,opacity;`); bar.id = 'bar'; stage.appendChild(bar);
  const beats = [0.3, 0.8, 1.3, 1.8, 2.4, 3.0, 3.6, 4.2, 4.8, 5.4];
  const g = (id) => document.getElementById(id);
  return (t) => {
    const tick = Math.floor(t * 12); const jx = (hash(tick) - 0.5) * 2; const on = hash(tick * 1.7) > 0.6;
    const subj = g('subject'); subj.style.opacity = String(clamp01(seg(t, 0.1, 0.5)));
    subj.style.transform = `translate(-50%,-50%) translateX(${on ? jx * 1.2 : 0}vw) scale(${0.85 + 0.15 * clamp01(eob(seg(t, 0.1, 0.8)))})`;
    const ti = g('title'); ti.style.opacity = String(clamp01(seg(t, 0.2, 0.5)));
    ti.style.clipPath = `inset(${(1 - eio(seg(t, 0.2, 0.9))) * 100}% 0 0 0)`;
    const gx = on ? jx * 0.8 : 0;
    ti.style.textShadow = `${(0.5 + gx).toFixed(2)}vw 0 rgba(255,0,80,0.85), ${(-0.5 + gx).toFixed(2)}vw 0 rgba(0,229,255,0.85)`;
    ti.style.transform = `translateX(${on ? gx : 0}vw)`;
    const su = g('sub'); su.style.opacity = String(clamp01(seg(t, 0.6, 0.9)) * (hash(tick * 2.3) > 0.15 ? 1 : 0.35));
    const eye = g('eyebrow'); if (eye) eye.style.opacity = String(clamp01(seg(t, 0.0, 0.4)));
    const cta = g('cta'); if (cta) { cta.style.opacity = String(clamp01(seg(t, 1.5, 1.9))); cta.style.transform = `scale(${0.9 + 0.1 * clamp01(eob(seg(t, 1.5, 2.1)))})`; }
    let bo = 0, by = 0; for (const b of beats) { const dt = t - b; if (dt >= 0 && dt < 0.12) { bo = Math.max(bo, (1 - dt / 0.12) * 0.5); by = hash(b) * 90; } } g('bar').style.opacity = String(bo); g('bar').style.top = by + '%';
  };
});

// ────────────────────────────────────────────────────────────────
let SEEK = null, DUR = 6;
window.initTemplate = function (cfg) {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  DUR = cfg.dur || 6;
  if (cfg.fontsDir) injectFonts(cfg.fontsDir);
  const fn = TEMPLATES[cfg.id] || TEMPLATES.story;
  SEEK = fn(stage, cfg.data || {});
  window.seek(0);
  return true;
};
window.seek = function (t) { if (SEEK) SEEK(t, DUR); };
window.templateIds = () => Object.keys(TEMPLATES);
</script>
</body>

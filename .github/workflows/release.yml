name: release

# Запускается при пуше тега вида v1.0.1 — собирает Windows-инсталлятор
# в облаке GitHub и публикует его как релиз (друзья получают авто-обновление).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      # Создаём релиз заранее, чтобы electron-builder заливал в существующий
      # и НЕ плодил второй дубль (гонка при параллельной заливке ассетов).
      - name: Create release
        run: gh release create "$env:GITHUB_REF_NAME" --title "$env:GITHUB_REF_NAME" --notes "$env:GITHUB_REF_NAME" 2>$null; exit 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Студия (public/studio) закоммичена в репо — CI её не собирает.
      - name: Build & publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
